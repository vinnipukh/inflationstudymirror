name: Daily Gurmar Price Scraper

# Define when the workflow should run
on:
  schedule:
    # Runs at 00:00 UTC every day. You can adjust the cron syntax as needed.
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to trigger the script manually from the GitHub UI

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    # Required permissions to push the newly created CSV back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Run the scraper script
        run: |
          python scraper.py

      - name: Commit and push CSV data
        run: |
          # Configure git so GitHub Actions can commit the files
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the newly created CSV file
          git add Datas/Markets/Gurmar/*.csv
          
          # Commit only if there are changes (prevents pipeline failure if no files changed)
          git commit -m "data: add daily ideal_prices for Gurmar market" || echo "No changes to commit"
          
          # Push back to the main branch
          git push