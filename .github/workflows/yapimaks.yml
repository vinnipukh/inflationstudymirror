name: Yapimaks Scraper Daily Run

on:
  schedule:
    # Her gün gece yarısı 02:00'da çalışır (UTC saati ile)
    - cron: '0 2 * * *'
  workflow_dispatch: # Manuel tetikleme için

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper
        # Belirttiğin tam dizindeki scripti çalıştırır
        run: python Codes/ConstructionMarkets/yapimaks/scraper.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Datas klasörünün altındaki tüm değişiklikleri ve logları kaydeder
          git add Datas/ logs/
          
          git commit -m "Auto-update: Tüm Datas ve log değişiklikleri eklendi [skip ci]" || echo "Değişiklik bulunamadı, commit atlandı."
          git push
