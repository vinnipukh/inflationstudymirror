name: Watsons Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *' # UTC 06:00 -> TRT 09:00
  workflow_dispatch:

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi beautifulsoup4 lxml

      - name: Watsons Scraper'ı Çalıştır
        run: |
          python Codes/Cosmetics/Watson/scraper.py

      - name: Yeni Verileri GitHub'a Yükle
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # SADECE Watsons klasöründeki CSV dosyalarını ekle (Logları dahil etmiyoruz)
          git add Datas/Cosmetics/Watson/*.csv
          
          # Değişiklik yoksa boş yere hata verip durmasın diye || exit 0
          git commit -m "Auto-update: Watsons enflasyon verisi $(date +'%Y-%m-%d')" || exit 0
          
          # Uzaktaki diğer değişiklikleri güvenle çek ve birleştir
          git pull --rebase origin ${{ github.ref_name }}
          
          # Sadece kendi commitimizi pushla
          git push origin HEAD:${{ github.ref_name }}