name: Chakra HomeGoods Scraper

on:
  schedule:
    # Türkiye saatiyle (UTC+3) sabah 11:00'de çalışması için 08:00 UTC ayarlandı
    - cron: '0 8 * * *'
  workflow_dispatch: # Manuel tetikleme için

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python Codes/HomeGoods/scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Datas/HomeGoods/*.csv
          git commit -m "data(chakra): günlük ev dekorasyonu ve mobilya verileri eklendi" || exit 0
          git push